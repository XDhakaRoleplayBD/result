{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <!-- CSS connect -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="userid" placeholder="User ID">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
