<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins', sans-serif;
    }

    body{
        background: linear-gradient(135deg, #0a3d62, #1e6091);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .login-box{
        width:100%;
        max-width:360px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border:1px solid rgba(255,255,255,0.3);
        border-radius:18px;
        padding:25px;
        box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    h2{
        text-align:center;
        color:white;
        font-size:24px;
        margin-bottom:20px;
        letter-spacing:1px;
    }

    input{
        width:100%;
        padding:12px 14px;
        margin:10px 0;
        border:none;
        border-radius:10px;
        outline:none;
        font-size:15px;
    }

    input:focus{
        box-shadow:0 0 0 2px #2ecc71;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:12px;
        border:none;
        border-radius:10px;
        background: linear-gradient(135deg, #27ae60, #2ecc71);
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s ease;
    }

    button:active{
        transform:scale(0.97);
    }

    /* MOBILE OPTIMIZATION */
    @media(max-width:480px){
        .login-box{
            padding:20px;
            border-radius:14px;
        }

        h2{
            font-size:20px;
        }

        input{
            font-size:14px;
        }

        button{
            font-size:15px;
        }
    }
</style>

<div class="login-box">
    <h2>Student Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>
</div>
